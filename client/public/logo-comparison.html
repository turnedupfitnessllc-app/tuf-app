<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TUF Logo — Blend</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #FF4500;
    margin-bottom: 32px;
  }

  /* ── Phone frame ── */
  .phone {
    width: 260px;
    height: 500px;
    border-radius: 36px;
    border: 2px solid rgba(255,255,255,0.1);
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,69,0,0.12),
      0 24px 80px rgba(0,0,0,0.9),
      0 0 60px rgba(255,69,0,0.08);
  }

  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 18%;
    /* Full panther visible, gently darkened */
    filter: brightness(0.5) saturate(1.15);
  }

  /* Spotlight: brightens the chest/logo zone */
  .spotlight {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 120px;
    background: radial-gradient(ellipse at center,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.08) 40%,
      transparent 70%
    );
    border-radius: 50%;
    pointer-events: none;
  }

  /* Red glow halo behind the UP logo */
  .logo-halo {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 90px;
    background: radial-gradient(ellipse at center,
      rgba(255,69,0,0.5) 0%,
      rgba(255,69,0,0.18) 50%,
      transparent 75%
    );
    border-radius: 50%;
    pointer-events: none;
  }

  /* Option B: vignette ring frames the logo */
  .vignette-ring {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 84px;
    border: 1.5px solid rgba(255,69,0,0.5);
    border-radius: 14px;
    box-shadow:
      0 0 24px rgba(255,69,0,0.35),
      inset 0 0 16px rgba(255,69,0,0.06);
    pointer-events: none;
  }

  /* Corner ticks on the ring */
  .vignette-ring::before,
  .vignette-ring::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: #FF4500;
    border-style: solid;
    opacity: 0.9;
  }
  .vignette-ring::before {
    top: -2px; left: -2px;
    border-width: 2px 0 0 2px;
    border-radius: 4px 0 0 0;
  }
  .vignette-ring::after {
    bottom: -2px; right: -2px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 4px 0;
  }

  /* Scan label under ring */
  .scan-label {
    position: absolute;
    left: 50%;
    top: calc(56% + 46px);
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: rgba(255,69,0,0.65);
    white-space: nowrap;
    pointer-events: none;
  }

  /* Dark vignette — edges only, preserves full panther */
  .edge-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 65% at 50% 40%,
      transparent 0%,
      rgba(8,8,8,0.35) 60%,
      rgba(8,8,8,0.75) 100%
    );
    pointer-events: none;
  }

  /* Bottom fade for text */
  .bottom-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52%;
    background: linear-gradient(to top,
      rgba(8,8,8,1) 0%,
      rgba(8,8,8,0.9) 25%,
      rgba(8,8,8,0.5) 55%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* App name */
  .app-name {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow:
      0 0 12px rgba(255,69,0,0.7),
      0 0 32px rgba(255,69,0,0.3);
  }
  .app-sub {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.35);
  }

  /* Pulse animation on the ring */
  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 24px rgba(255,69,0,0.35), inset 0 0 16px rgba(255,69,0,0.06); }
    50%       { box-shadow: 0 0 40px rgba(255,69,0,0.6), inset 0 0 20px rgba(255,69,0,0.12); }
  }
  .vignette-ring { animation: ringPulse 2.5s ease-in-out infinite; }

  @keyframes haloPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }
  .logo-halo { animation: haloPulse 2.5s ease-in-out infinite; }

  .badge {
    margin-top: 24px;
    background: rgba(255,69,0,0.12);
    border: 1px solid rgba(255,69,0,0.3);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #FF4500;
    text-align: center;
  }
</style>
</head>
<body>

<p class="page-title">LOGO TREATMENT</p>
<p class="page-sub">BLEND — A + B COMBINED</p>

<div class="phone">
  <img class="bg-img"
    src="https://d2xsxph8kpxj0f.cloudfront.net/310519663432145978/c6QtxNhJJDYmnbZswK9UTR/panther-mascot-gym_27e64ae1.png"
    alt="panther" />
  <div class="edge-vignette"></div>
  <div class="spotlight"></div>
  <div class="logo-halo"></div>
  <div class="vignette-ring"></div>
  <div class="scan-label">▸ UP MARK</div>
  <div class="bottom-fade"></div>
  <div class="app-name">TURNED UP FITNESS</div>
  <div class="app-sub">AI PERFORMANCE COACHING</div>
</div>

<div class="badge">
  Full panther · Red glow halo · Scan ring · Dark edge vignette
</div>

</body>
</html>
